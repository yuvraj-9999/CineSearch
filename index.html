<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch — Discover Movies & Series</title>
    <meta name="description" content="CineSearch: Search millions of movies and TV series. Discover plots, cast, ratings, and more in one elegant cinematic experience.">
    <link rel="icon" href="./favicon.ico">
    <link rel="shortcut icon" href="./favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ── HERO SECTION ───────────────────────────────────────────── -->
    <header class="hero" id="hero">
        <div class="hero__bg-gradient"></div>
        <div class="hero__content">
            <!-- Cinematic film-reel icon -->
            <div class="hero__icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="32" cy="32" r="30" stroke="#F5C518" stroke-width="2.5" stroke-dasharray="6 4"/>
                    <circle cx="32" cy="32" r="12" fill="#F5C518" opacity="0.15" stroke="#F5C518" stroke-width="2"/>
                    <circle cx="32" cy="32" r="4" fill="#F5C518"/>
                    <circle cx="32" cy="10" r="4" fill="#F5C518" opacity="0.8"/>
                    <circle cx="32" cy="54" r="4" fill="#F5C518" opacity="0.8"/>
                    <circle cx="10" cy="32" r="4" fill="#F5C518" opacity="0.8"/>
                    <circle cx="54" cy="32" r="4" fill="#F5C518" opacity="0.8"/>
                    <circle cx="16" cy="16" r="3.5" fill="#F5C518" opacity="0.5"/>
                    <circle cx="48" cy="16" r="3.5" fill="#F5C518" opacity="0.5"/>
                    <circle cx="16" cy="48" r="3.5" fill="#F5C518" opacity="0.5"/>
                    <circle cx="48" cy="48" r="3.5" fill="#F5C518" opacity="0.5"/>
                </svg>
            </div>

            <h1 class="hero__title">
                <span class="hero__title-cine">Cine</span><span class="hero__title-search">Search</span>
            </h1>
            <p class="hero__tagline">Discover movies, series, and unforgettable stories.</p>

            <!-- Search bar lives in the hero as the primary CTA -->
            <div class="controls" id="controls">
                <form action="#" id="input-form" role="search" aria-label="Movie search">
                    <div class="search-field">
                        <span class="search-field__icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                        </span>
                        <input
                            type="search"
                            id="search-input"
                            placeholder="Search for a movie or series…"
                            autocomplete="off"
                            aria-label="Search for a movie or series"
                        >
                        <button type="submit" id="search-btn" aria-label="Search">Search</button>
                    </div>
                </form>

                <div class="sort-wrapper">
                    <label for="sort-filter" class="sr-only">Sort results by</label>
                    <div class="select-wrapper">
                        <select id="sort-filter" aria-label="Sort results">
                            <option value="">Sort by</option>
                            <option value="year-desc">Newest First</option>
                            <option value="year-asc">Oldest First</option>
                            <option value="title-asc">Title (A–Z)</option>
                            <option value="title-desc">Title (Z–A)</option>
                        </select>
                        <span class="select-wrapper__arrow" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ── MAIN CONTENT ── -->
    <main class="app" id="app">
        <div id="status" role="status" aria-live="polite"></div>
        <ul id="movie-list" aria-label="Search results"></ul>
        <nav id="pagination" aria-label="Page navigation"></nav>
    </main>

    <!-- ── MODAL ── -->
    <div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal">
            <button id="close-modal" aria-label="Close details panel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
